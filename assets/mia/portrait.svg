<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b7cc8;stop-opacity:1"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#f5d0a9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8b98a;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="hoodieShadow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- Subtle ring border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.35"/>

  <g clip-path="url(#circleClip)">

    <!-- Hoodie / shoulders — wide trapezoid shape -->
    <path d="M 20 200 L 20 155 Q 45 135 70 128 L 80 122 L 120 122 L 130 128 Q 155 135 180 155 L 180 200 Z"
          fill="url(#hoodieShadow)"/>

    <!-- Hoodie highlight on left shoulder -->
    <path d="M 20 200 L 20 162 Q 42 143 65 133 L 75 127 L 78 129 Q 55 140 35 162 L 35 200 Z"
          fill="#8b5cf6" fill-opacity="0.5"/>

    <!-- Collar / neck area -->
    <path d="M 85 128 Q 90 138 100 140 Q 110 138 115 128 L 120 122 L 80 122 Z"
          fill="#6d28d9"/>

    <!-- Neck -->
    <rect x="89" y="108" width="22" height="22" rx="6" fill="url(#skinGrad)"/>

    <!-- Head -->
    <ellipse cx="100" cy="90" rx="34" ry="37" fill="url(#skinGrad)"/>

    <!-- Ear left -->
    <ellipse cx="66" cy="91" rx="5.5" ry="7" fill="#e8b98a"/>
    <ellipse cx="66" cy="91" rx="3" ry="4.5" fill="#d9a87a"/>

    <!-- Ear right -->
    <ellipse cx="134" cy="91" rx="5.5" ry="7" fill="#e8b98a"/>
    <ellipse cx="134" cy="91" rx="3" ry="4.5" fill="#d9a87a"/>

    <!-- Hair — base dark brown/almost black -->
    <ellipse cx="100" cy="66" rx="35" ry="30" fill="#2a1a0e"/>

    <!-- Hair — top volume -->
    <path d="M 66 78 Q 65 55 75 48 Q 85 40 100 38 Q 115 40 125 48 Q 135 55 134 78"
          fill="#2a1a0e"/>

    <!-- Hair — left side sweep -->
    <path d="M 66 78 Q 60 75 62 88 Q 64 95 68 95" fill="#2a1a0e"/>
    <path d="M 134 78 Q 140 75 138 88 Q 136 95 132 95" fill="#2a1a0e"/>

    <!-- Hair highlight -->
    <path d="M 82 42 Q 95 38 108 41 Q 105 45 100 46 Q 92 45 82 42 Z"
          fill="#3d2a15" fill-opacity="0.7"/>

    <!-- Ponytail attachment at back-right -->
    <path d="M 128 68 Q 138 62 148 72 Q 152 82 146 92 Q 140 98 134 88 Q 130 78 128 68 Z"
          fill="#2a1a0e"/>
    <!-- Ponytail strand -->
    <path d="M 142 74 Q 156 78 158 92 Q 159 104 150 108 Q 145 100 148 90 Q 146 80 138 77 Z"
          fill="#231608"/>
    <!-- Hair tie scrunchie (violet) -->
    <ellipse cx="144" cy="80" rx="6" ry="4" fill="#7c3aed" transform="rotate(-20 144 80)"/>
    <ellipse cx="144" cy="80" rx="4" ry="2.5" fill="#a78bfa" transform="rotate(-20 144 80)"/>

    <!-- Eyebrows -->
    <path d="M 82 79 Q 89 75 95 77" stroke="#2a1a0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 105 77 Q 111 75 118 79" stroke="#2a1a0e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Glasses frames — violet rounded rectangles -->
    <!-- Left lens frame -->
    <rect x="79" y="83" width="18" height="13" rx="4.5" fill="none" stroke="#a78bfa" stroke-width="2.2"/>
    <!-- Right lens frame -->
    <rect x="103" y="83" width="18" height="13" rx="4.5" fill="none" stroke="#a78bfa" stroke-width="2.2"/>
    <!-- Bridge -->
    <line x1="97" y1="89" x2="103" y2="89" stroke="#a78bfa" stroke-width="2"/>
    <!-- Left temple -->
    <line x1="79" y1="89" x2="71" y2="88" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right temple -->
    <line x1="121" y1="89" x2="129" y2="88" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Lens glass tint -->
    <rect x="79" y="83" width="18" height="13" rx="4.5" fill="#a78bfa" fill-opacity="0.12"/>
    <rect x="103" y="83" width="18" height="13" rx="4.5" fill="#a78bfa" fill-opacity="0.12"/>

    <!-- Eyes -->
    <!-- Left eye -->
    <ellipse cx="88" cy="89.5" rx="5" ry="4" fill="#1a1a2e"/>
    <ellipse cx="88" cy="89.5" rx="2.8" ry="2.8" fill="#5b3a1e"/>
    <circle cx="88" cy="89.5" r="1.8" fill="#1a1010"/>
    <circle cx="89.5" cy="88.2" r="1" fill="white" fill-opacity="0.85"/>

    <!-- Right eye -->
    <ellipse cx="112" cy="89.5" rx="5" ry="4" fill="#1a1a2e"/>
    <ellipse cx="112" cy="89.5" rx="2.8" ry="2.8" fill="#5b3a1e"/>
    <circle cx="112" cy="89.5" r="1.8" fill="#1a1010"/>
    <circle cx="113.5" cy="88.2" r="1" fill="white" fill-opacity="0.85"/>

    <!-- Nose -->
    <path d="M 98 95 Q 96 102 99 104 Q 100 105 101 104 Q 104 102 102 95"
          stroke="#c49070" stroke-width="1.3" fill="none" stroke-linecap="round"/>

    <!-- Smile / mouth — friendly curve -->
    <path d="M 90 110 Q 96 116 100 116 Q 104 116 110 110"
          stroke="#c07a60" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Teeth hint -->
    <path d="M 91 111 Q 96 115 100 115 Q 104 115 109 111"
          fill="white" fill-opacity="0.6"/>
    <!-- Lip lower -->
    <path d="M 93 113 Q 100 117 107 113" stroke="#c07a60" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Cheek blush left -->
    <ellipse cx="79" cy="103" rx="8" ry="5" fill="#f0a090" fill-opacity="0.28"/>
    <!-- Cheek blush right -->
    <ellipse cx="121" cy="103" rx="8" ry="5" fill="#f0a090" fill-opacity="0.28"/>

    <!-- Gamepad icon on hoodie center -->
    <g transform="translate(88, 152)">
      <!-- Gamepad body -->
      <rect x="0" y="0" width="24" height="16" rx="8" fill="#5b21b6" stroke="#c4b5fd" stroke-width="1"/>
      <!-- D-pad left stub -->
      <rect x="2" y="5" width="4" height="3" rx="1" fill="#c4b5fd"/>
      <!-- D-pad right stub -->
      <rect x="9" y="5" width="4" height="3" rx="1" fill="#c4b5fd"/>
      <!-- D-pad up stub -->
      <rect x="5" y="3" width="3" height="4" rx="1" fill="#c4b5fd"/>
      <!-- D-pad down stub -->
      <rect x="5" y="7" width="3" height="4" rx="1" fill="#c4b5fd"/>
      <!-- Buttons -->
      <circle cx="17" cy="5" r="1.8" fill="#a78bfa"/>
      <circle cx="20" cy="8" r="1.8" fill="#7c3aed"/>
      <circle cx="17" cy="11" r="1.8" fill="#c4b5fd"/>
      <circle cx="14" cy="8" r="1.8" fill="#8b5cf6"/>
    </g>

  </g>
</svg>
