<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fdba74;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6B4F12;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="hoodieShadow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- Subtle ring border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.35"/>

  <g clip-path="url(#circleClip)">

    <!-- Jacket / shoulders — very dark -->
    <path d="M 20 200 L 20 155 Q 45 135 70 128 L 80 122 L 120 122 L 130 128 Q 155 135 180 155 L 180 200 Z"
          fill="url(#hoodieShadow)"/>

    <!-- Jacket highlight -->
    <path d="M 20 200 L 20 162 Q 42 143 65 133 L 75 127 L 78 129 Q 55 140 35 162 L 35 200 Z"
          fill="#1e293b" fill-opacity="0.5"/>

    <!-- Jacket lapel / collar — orange accent -->
    <path d="M 80 122 L 85 128 Q 90 136 100 138 Q 110 136 115 128 L 120 122 Z"
          fill="#0f172a"/>
    <path d="M 80 122 L 86 130 L 92 122 Z" fill="#f97316" fill-opacity="0.6"/>
    <path d="M 120 122 L 114 130 L 108 122 Z" fill="#f97316" fill-opacity="0.6"/>

    <!-- Neck -->
    <rect x="89" y="108" width="22" height="22" rx="6" fill="url(#skinGrad)"/>

    <!-- Head -->
    <ellipse cx="100" cy="88" rx="34" ry="38" fill="url(#skinGrad)"/>

    <!-- Ear left -->
    <ellipse cx="66" cy="90" rx="5.5" ry="7" fill="#6B4F12"/>
    <ellipse cx="66" cy="90" rx="3" ry="4.5" fill="#5a4210"/>

    <!-- Ear right -->
    <ellipse cx="134" cy="90" rx="5.5" ry="7" fill="#6B4F12"/>
    <ellipse cx="134" cy="90" rx="3" ry="4.5" fill="#5a4210"/>

    <!-- Hair — short textured afro -->
    <ellipse cx="100" cy="62" rx="38" ry="30" fill="#0a0806"/>

    <!-- Afro top volume -->
    <path d="M 62 74 Q 60 48 72 40 Q 82 32 100 30 Q 118 32 128 40 Q 140 48 138 74"
          fill="#0a0806"/>

    <!-- Hair texture dots for afro effect -->
    <circle cx="80" cy="42" r="2" fill="#1a1510" fill-opacity="0.6"/>
    <circle cx="92" cy="36" r="2.5" fill="#1a1510" fill-opacity="0.5"/>
    <circle cx="108" cy="36" r="2.5" fill="#1a1510" fill-opacity="0.5"/>
    <circle cx="120" cy="42" r="2" fill="#1a1510" fill-opacity="0.6"/>
    <circle cx="74" cy="50" r="2" fill="#1a1510" fill-opacity="0.4"/>
    <circle cx="126" cy="50" r="2" fill="#1a1510" fill-opacity="0.4"/>
    <circle cx="86" cy="34" r="1.5" fill="#1a1510" fill-opacity="0.5"/>
    <circle cx="114" cy="34" r="1.5" fill="#1a1510" fill-opacity="0.5"/>
    <circle cx="100" cy="32" r="2" fill="#1a1510" fill-opacity="0.4"/>

    <!-- Hair sides -->
    <path d="M 62 74 Q 60 78 62 88 Q 63 92 66 92" fill="#0a0806"/>
    <path d="M 138 74 Q 140 78 138 88 Q 137 92 134 92" fill="#0a0806"/>

    <!-- Eyebrows — strong, defined -->
    <path d="M 80 78 Q 87 73 95 76" stroke="#0a0806" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 105 76 Q 113 73 120 78" stroke="#0a0806" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Eyes — deep brown, confident -->
    <!-- Left eye -->
    <ellipse cx="88" cy="88.5" rx="5.5" ry="4.5" fill="#1a1a2e"/>
    <ellipse cx="88" cy="88.5" rx="3" ry="3" fill="#2a1508"/>
    <circle cx="88" cy="88.5" r="2" fill="#0a0804"/>
    <circle cx="89.5" cy="87.2" r="1.1" fill="white" fill-opacity="0.85"/>

    <!-- Right eye -->
    <ellipse cx="112" cy="88.5" rx="5.5" ry="4.5" fill="#1a1a2e"/>
    <ellipse cx="112" cy="88.5" rx="3" ry="3" fill="#2a1508"/>
    <circle cx="112" cy="88.5" r="2" fill="#0a0804"/>
    <circle cx="113.5" cy="87.2" r="1.1" fill="white" fill-opacity="0.85"/>

    <!-- Nose — broader, well-defined -->
    <path d="M 96 94 Q 94 101 96 104 Q 98 107 100 107 Q 102 107 104 104 Q 106 101 104 94"
          stroke="#5a4210" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Nostril hints -->
    <circle cx="96" cy="104" r="1.5" fill="#5a4210" fill-opacity="0.3"/>
    <circle cx="104" cy="104" r="1.5" fill="#5a4210" fill-opacity="0.3"/>

    <!-- Smile — wide, confident, warm -->
    <path d="M 88 110 Q 94 118 100 118 Q 106 118 112 110"
          stroke="#5a3a10" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Teeth hint -->
    <path d="M 90 111 Q 96 116 100 116 Q 104 116 110 111"
          fill="white" fill-opacity="0.55"/>
    <!-- Lower lip -->
    <path d="M 92 113 Q 100 119 108 113" stroke="#5a3a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Cheek highlight -->
    <ellipse cx="77" cy="102" rx="6" ry="4" fill="#9B7918" fill-opacity="0.2"/>
    <ellipse cx="123" cy="102" rx="6" ry="4" fill="#9B7918" fill-opacity="0.2"/>

    <!-- Small goatee -->
    <ellipse cx="100" cy="120" rx="6" ry="4" fill="#0a0806" fill-opacity="0.3"/>
    <path d="M 96 118 Q 100 124 104 118" stroke="#0a0806" stroke-width="1" fill="none" stroke-opacity="0.4"/>

    <!-- Game controller / polygon icon on jacket -->
    <g transform="translate(84, 152)">
      <!-- 3D cube wireframe -->
      <!-- Front face -->
      <polygon points="8,6 20,6 22,2 10,2" fill="none" stroke="#f97316" stroke-width="1.2"/>
      <polygon points="8,6 20,6 20,18 8,18" fill="#0f172a" stroke="#f97316" stroke-width="1.2"/>
      <!-- Top face -->
      <polygon points="8,6 10,2 22,2 20,6" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
      <!-- Side face -->
      <polygon points="20,6 22,2 22,14 20,18" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
      <!-- Polygon text -->
      <text x="16" y="24" font-family="monospace" font-size="5" fill="#f97316" text-anchor="middle" font-weight="bold">3D</text>
    </g>

  </g>
</svg>
